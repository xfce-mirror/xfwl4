[licenses]
allow = [
    "0BSD",
    "Apache-2.0 WITH LLVM-exception",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-2-Clause-Patent",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "GPL-2.0-or-later",
    "GPL-3.0",
    "GPL-3.0-only",
    "GPL-3.0-or-later",
    "ISC",
    "LGPL-2.0-or-later",
    "LGPL-2.1",
    "LGPL-2.1-only",
    "LGPL-2.1-or-later",
    "LGPL-3.0",
    "LGPL-3.0-only",
    "LGPL-3.0-or-later",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8
unused-allowed-license = "allow"

[advisories]
ignore = [
    # proc-macro-error maintainer unreachable (dep of glib/gtk)
    "RUSTSEC-2024-0370",
    # gdk unmaintained
    "RUSTSEC-2024-0412",
    # atk unmaintined
    "RUSTSEC-2024-0413",
    # gtk unmaintained
    "RUSTSEC-2024-0415",
    # atk-sys unmaintained
    "RUSTSEC-2024-0416",
    # gdk-sys unmaintained
    "RUSTSEC-2024-0418",
    # gtk3-macros unmaintained
    "RUSTSEC-2024-0419",
    # gtk-sys unmaintained
    "RUSTSEC-2024-0420",
    # paste unmaintained (dep of pixman)
    "RUSTSEC-2024-0436"
]
