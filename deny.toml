[licenses]
allow = [
    "0BSD",
    "Apache-2.0 WITH LLVM-exception",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-2-Clause-Patent",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "GPL-2.0-or-later",
    "GPL-3.0",
    "GPL-3.0-only",
    "GPL-3.0-or-later",
    "ISC",
    "LGPL-2.0-or-later",
    "LGPL-2.1",
    "LGPL-2.1-only",
    "LGPL-2.1-or-later",
    "LGPL-3.0",
    "LGPL-3.0-only",
    "LGPL-3.0-or-later",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8
unused-allowed-license = "allow"

[advisories]
ignore = [
    # proc-macro-error maintainer unreachable (dep of glib/gtk)
    "RUSTSEC-2024-0370",
    # gdk unmaintained
    "RUSTSEC-2024-0412",
    # atk unmaintined
    "RUSTSEC-2024-0413",
    # gtk unmaintained
    "RUSTSEC-2024-0415",
    # atk-sys unmaintained
    "RUSTSEC-2024-0416",
    # gdk-sys unmaintained
    "RUSTSEC-2024-0418",
    # gtk3-macros unmaintained
    "RUSTSEC-2024-0419",
    # gtk-sys unmaintained
    "RUSTSEC-2024-0420",
    # soundness issue with glib; can't do anything about it except don't use `VariantStrIter`
    "RUSTSEC-2024-0429",
    # paste unmaintained (dep of pixman)
    "RUSTSEC-2024-0436",
    # quick-xml quadratic behavior; can't do anything about it as it's a
    # transitive dependency.  Doesn't matter because we don't feed it untrusted
    # input.
    "RUSTSEC-2026-0194",
    # quick-xml unbounded namespace allocations; can't do anything about it as
    # it's a transitive dependency.  Doesn't matter because we don't feed it
    # untrusted input.
    "RUSTSEC-2026-0195",
    # cgmath unmaintained; can't do anything about it as it's a smithay
    # dependency, and there's no alternative.
    "RUSTSEC-2026-0196",
]
