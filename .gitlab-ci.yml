include:
  - project: 'xfce/xfce4-dev-tools'
    file: '/ci/build_project.yml'

# build.rs generates src/build_config.rs, but we don't want to run the full
# build just for the formatting check.
rustfmt:
  before_script:
    - echo '// placeholder; real file generated by build.rs' > src/build_config.rs
